<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자카르타 K-Food 배달 (WhatsApp 연동)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --primary: #FF3D68;
            --primary-dark: #E02957;
            --secondary: #6C5CE7;
            --accent: #FFD23F;
            --bg: #FAFAFC;
            --surface: #FFFFFF;
            --text: #1A1A2E;
            --text-sub: #8A8A9E;
            --border: #F0F0F5;
            --whatsapp: #25D366;
            --gradient: linear-gradient(135deg, #FF3D68 0%, #FF6B9D 50%, #FFB86C 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Top app bar */
        .appbar {
            background: var(--surface);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .appbar .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }

        .appbar .back {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--border);
            font-size: 18px;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }

        .appbar .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
            border: none;
        }

        .container {
            padding: 16px;
            padding-bottom: 120px;
        }

        /* Hero banner */
        .hero {
            background: var(--gradient);
            border-radius: 20px;
            padding: 22px;
            color: white;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(255, 61, 104, 0.25);
        }

        .hero::after {
            content: '🍜';
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 110px;
            opacity: 0.25;
        }

        .hero h1 {
            margin: 0 0 6px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .hero p {
            margin: 0;
            font-size: 13px;
            opacity: 0.95;
        }

        /* Search */
        .search {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            background: transparent;
        }

        /* Category chips */
        .chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            margin: 0 -16px 18px;
            padding-left: 16px;
            padding-right: 16px;
            scrollbar-width: none;
        }

        .chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 9px 16px;
            border-radius: 999px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.15s;
        }

        .chip.active {
            background: var(--text);
            color: white;
            border-color: var(--text);
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin: 4px 0 12px;
        }

        /* Restaurant card */
        .resto {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 14px;
            cursor: pointer;
            transition: transform 0.15s;
            border: 1px solid var(--border);
        }

        .resto:active {
            transform: scale(0.98);
        }

        .resto .cover {
            height: 140px;
            background: linear-gradient(135deg, #ffe0e9, #ffd6c2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 54px;
        }

        .resto .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .resto .tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 999px;
        }

        .resto .like {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .resto .info {
            padding: 14px 16px;
        }

        .resto .name {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .resto .desc {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .resto .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12.5px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .resto .meta .rating {
            color: var(--text);
        }

        .resto .meta .rating .star {
            color: #FFB800;
        }

        .resto .meta .dot {
            opacity: 0.4;
        }

        .resto .addr {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 6px;
        }

        /* Menu card */
        .menu-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
        }

        .menu-card .thumb {
            width: 92px;
            height: 92px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--border);
            position: relative;
        }

        .menu-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .menu-card .badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 6px;
            letter-spacing: 0.3px;
        }

        .menu-card .body {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .menu-card .name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 3px;
            letter-spacing: -0.2px;
        }

        .menu-card .desc {
            font-size: 12.5px;
            color: var(--text-sub);
            line-height: 1.4;
            margin-bottom: auto;
        }

        .menu-card .bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }

        .menu-card .price {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }

        .add-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--text);
            color: white;
            border: none;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        /* Cart item */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-item .cthumb {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--border);
        }

        .cart-item .cthumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item .cinfo {
            flex: 1;
            min-width: 0;
        }

        .cart-item .cname {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .cart-item .cprice {
            font-size: 13.5px;
            color: var(--text);
            font-weight: 700;
        }

        .qty {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg);
            border-radius: 999px;
            padding: 4px;
        }

        .qty button {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
            color: var(--text);
        }

        .qty span {
            min-width: 18px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
        }

        /* Form */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        input[type="datetime-local"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: var(--surface);
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="datetime-local"]:focus,
        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .summary {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 5px 0;
            color: var(--text-sub);
        }

        .summary-row.total {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            padding-top: 12px;
            margin-top: 8px;
            border-top: 1px dashed var(--border);
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: -0.2px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 6px 16px rgba(255, 61, 104, 0.35);
        }

        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.35);
        }

        .btn-ghost {
            background: var(--border);
            color: var(--text);
            margin-top: 10px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Floating cart bar */
        .cart-bar {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: var(--text);
            color: white;
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 10px 24px rgba(26, 26, 46, 0.3);
            cursor: pointer;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.25s, opacity 0.25s;
        }

        .cart-bar.show {
            transform: none;
            opacity: 1;
        }

        .cart-bar .count {
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 999px;
            margin-right: 10px;
        }

        .cart-bar .label {
            font-size: 14px;
            font-weight: 700;
            flex: 1;
        }

        .cart-bar .total {
            font-size: 15px;
            font-weight: 800;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
        }

        .empty .emoji {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .empty .msg {
            font-size: 15px;
            font-weight: 600;
        }

        .category-sep {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            margin: 18px 0 10px;
            letter-spacing: -0.3px;
        }
    </style>
</head>

<body>

    <div class="appbar">
        <button class="back" id="back-btn" onclick="goHome()" style="display:none;">←</button>
        <div class="brand" id="header-title">K-Food Jakarta</div>
        <button class="icon-btn" title="알림">🔔</button>
    </div>

    <!-- HOME -->
    <div id="view-restaurants" class="view active container">
        <div class="hero">
            <h1>한식이 땡기는 날 🔥</h1>
            <p>자카르타 최고의 한식당, 지금 WhatsApp으로 주문!</p>
        </div>

        <div class="search">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="식당, 메뉴 검색..." oninput="filterRestaurants()">
        </div>

        <div class="chips" id="category-chips">
            <div class="chip active" data-cat="all" onclick="setCategory(this)">전체</div>
            <div class="chip" data-cat="bbq" onclick="setCategory(this)">🥩 고기구이</div>
            <div class="chip" data-cat="seafood" onclick="setCategory(this)">🐟 해산물</div>
            <div class="chip" data-cat="stew" onclick="setCategory(this)">🍲 찌개/탕</div>
            <div class="chip" data-cat="rice" onclick="setCategory(this)">🍚 밥/면</div>
            <div class="chip" data-cat="indo" onclick="setCategory(this)">🇮🇩 인도네시안</div>
        </div>

        <div class="section-title">🏆 인기 맛집 Top 6</div>
        <div id="resto-list"></div>
    </div>

    <!-- MENUS -->
    <div id="view-menus" class="view container">
        <div id="menu-list"></div>
    </div>

    <!-- CART -->
    <div id="view-cart" class="view container">
        <div class="section-title">🛒 주문 확인</div>
        <div id="cart-items" style="margin-bottom:16px;"></div>

        <div class="section-title" style="margin-top:24px;">📍 배달 정보</div>
        <div class="field">
            <label>발송 방식</label>
            <div style="display:flex;gap:12px;margin-top:8px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="radio" name="sendType" value="now" checked onchange="toggleReservation()">
                    <span style="font-weight:600;">🚀 즉시발송</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="radio" name="sendType" value="reserve" onchange="toggleReservation()">
                    <span style="font-weight:600;">📅 예약발송</span>
                </label>
            </div>
        </div>
        <div class="field" id="reservation-field" style="display:none;">
            <label>예약 시간</label>
            <input type="datetime-local" id="reservation-time">
        </div>
        <div class="field">
            <label>배달 주소</label>
            <input type="text" id="delivery-address" placeholder="예: Senopati Apt 101동 202호" required>
        </div>

        <div class="summary">
            <div class="summary-row"><span>주문 금액</span><span id="sum-items">Rp 0</span></div>
            <div class="summary-row"><span>배달팁</span><span style="color:var(--whatsapp);font-weight:700;">무료</span>
            </div>
            <div class="summary-row total"><span>총 결제금액</span><span id="sum-total">Rp 0</span></div>
        </div>

        <button class="btn btn-whatsapp" onclick="submitOrder()">💬 WhatsApp으로 주문 보내기</button>
        <button class="btn btn-ghost" onclick="backToMenus()">메뉴 더 담기</button>
    </div>

    <!-- Floating Cart Bar -->
    <div class="cart-bar" id="cart-bar" onclick="goToCart()">
        <span class="count" id="cart-count">0</span>
        <span class="label">장바구니 보기</span>
        <span class="total" id="cart-total">Rp 0</span>
    </div>

        function renderRestaurants() {
            const list = document.getElementById('resto-list');
            const term = searchTerm.trim().toLowerCase();
            const filtered = restaurants.filter(r => {
                const catOk = currentCategory === 'all' || r.cats.includes(currentCategory);
                if (!catOk) return false;
                if (!term) return true;
                if (r.name.toLowerCase().includes(term) || r.sub.toLowerCase().includes(term)) return true;
                const menus = dbMenus[r.id] || [];
                return menus.some(m => m.name.toLowerCase().includes(term));
            });
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty"><div class="emoji">🔍</div><div class="msg">검색 결과가 없어요</div></div>`;
                return;
            }
            list.innerHTML = filtered.map(r => `
                <div class="resto" onclick="showMenus('${r.id}', ${JSON.stringify(r.name).replace(/"/g, '&quot;')})">
                    <div class="cover">
                        <img src="${r.cover}" alt="${r.name}" onerror="this.style.display='none'">
                        <div class="tag">${r.tag}</div>
                        <button class="like" onclick="event.stopPropagation(); toggleLike(this)">🤍</button>
                    </div>
                    <div class="info">
                        <div class="name">${r.name}</div>
                        <div class="desc">${r.sub}</div>
                        <div class="meta">
                            <span class="rating"><span class="star">★</span> ${r.rating} <span style="color:var(--text-sub);font-weight:500;">(${r.reviews})</span></span>
                            <span class="dot">•</span>
                            <span>🛵 ${r.time}</span>
                            <span class="dot">•</span>
                            <span style="color:var(--whatsapp);">배달 ${r.fee}</span>
                        </div>
                        <div class="addr">📍 ${r.addr}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleLike(btn) {
            if (btn.innerText === '🤍') { btn.innerText = '❤️'; }
            else { btn.innerText = '🤍'; }
        }

        function setCategory(el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCategory = el.dataset.cat;
            renderRestaurants();
        }

                '생갈비': 'korean-barbecue-galbi',
                '양념갈비': 'marinated-beef-ribs',
                '불고기': 'bulgogi',
                '차돌박이': 'beef-brisket',
                '삼겹살': 'pork-belly',
                '보쌈': 'bossam',
                '두부보쌈': 'tofu-bossam',
                '콩비지찌개': 'soybean-stew',
                '청국장찌개': 'fermented-soybean-stew',
                '순두부찌개': 'soft-tofu-stew',
                '두부제육김치': 'spicy-pork-tofu',
                '대감집 도시락': 'korean-lunchbox',
                '두부 마카롱': 'tofu-macarons',
                '콩물': 'soy-milk',
                '생과일 주스': 'fresh-fruit-juice',
                '모듬회': 'sashimi',
                '다금바리': 'sea-bream-sashimi',
                '광어회': 'flounder-sashimi',
                '참치회': 'tuna-sashimi',
                '바다장어': 'grilled-eel',
                '산낙지': 'live-octopus',
                '회덮밥': 'sashimi-rice-bowl',
                '물회': 'chilled-fish-soup',
                '해물탕': 'seafood-stew',
                '전복죽': 'abalone-porridge',
                '생갈비 (300g)': 'korean-beef-ribs',
                '꽃갈비살': 'galbi-slice',
                'LA갈비': 'LA-galbi',
                '광양불고기': 'gwangyang-bulgogi',
                '우설': 'ox-tongue',
                '쭈꾸미 삼겹살': 'spicy-octopus-pork',
                '김치전골': 'kimchi-stew',
                '갈비탕': 'galbitang',
                '우삼겹': 'beef-brisket-korean-barbecue',
                '숯불갈비': 'charcoal-grilled-galbi',
                '돼지갈비': 'pork-ribs',
                '새우구이': 'grilled-shrimp',
                '냉면': 'korean-cold-noodles',
                '차돌 된장찌개': 'soybean-paste-stew',
                '계란찜': 'steamed-egg',
                'Sapo Seafood Tahu': 'seafood-tofu-hotpot',
                'Mapo Tahu': 'mapo-tofu',
                'Sunuk Lodi': 'fish-steak',
                'Garupa': 'garoupa-fish',
                'Pomfret': 'pomfret-fish',
                'Ayam Goreng Mentega': 'indonesian-fried-chicken',
                'Mie Ulang Tahun': 'birthday-noodles',
                'Nasi Goreng': 'nasi-goreng',
                'Gado Gado': 'gado-gado',
                '생등심': 'sirloin-steak',
                '차돌박이': 'beef-brisket',
                '양념 돼지갈비': 'marinated-pork-ribs',
                '돌솥비빔밥': 'dolsot-bibimbap',
                '제육볶음': 'spicy-pork-stirfry',
                '한우육회': 'beef-tartare'
            };
            for (const key in queries) {
                if (name.includes(key)) {
                    return `https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200&q=80`;
                }
            }
            return `https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200&q=80`;
        }

        function showMenus(id, name) {
            // 다른 식당 전환 시 장바구니 초기화 (WhatsApp 주문은 식당별이므로)
            if (currentResId && currentResId !== id && cart.length > 0) {
                if (!confirm(`다른 식당(${currentResName})의 장바구니를 비우고 ${name} 메뉴를 볼까요?`)) return;
                cart = [];
            }
            currentResId = id; currentResName = name;
            const list = document.getElementById('menu-list');

            // 식당 정보 헤더
            const r = restaurants.find(x => x.id === id);
            let html = '';
            if (r) {
                html += `
                <div style="background:var(--gradient); border-radius:18px; padding:20px; color:white; margin-bottom:18px; box-shadow:0 8px 20px rgba(255,61,104,0.25);">
                    <div style="font-size:22px; font-weight:800; letter-spacing:-0.5px;">${r.name}</div>
                    <div style="font-size:13px; opacity:0.95; margin-top:4px;">${r.sub}</div>
                    <div style="display:flex; gap:12px; margin-top:10px; font-size:12.5px; font-weight:600;">
                        <span>★ ${r.rating} (${r.reviews})</span>
                        <span style="opacity:0.6;">•</span>
                        <span>🛵 ${r.time}</span>
                        <span style="opacity:0.6;">•</span>
                        <span>배달 ${r.fee}</span>
                    </div>
                </div>`;
            }
            html += `<div class="section-title">🍽️ 메뉴</div>`;

            dbMenus[id].forEach(m => {
                const imgSrc = m.img || getMenuImage(m.name);
                let badge = '';
                if (popularIds.has(m.id)) badge = '<div class="badge">인기</div>';
                else if (newIds.has(m.id)) badge = '<div class="badge" style="background:var(--secondary);">NEW</div>';
                html += `
                    <div class="menu-card">
                        <div class="thumb">
                            <img src="${imgSrc}" alt="${m.name}" onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200&q=80'">
                            ${badge}
                        </div>
                        <div class="body">
                            <div class="name">${m.name}</div>
                            <div class="desc">${m.desc}</div>
                            <div class="bottom">
                                <div class="price">Rp ${m.price.toLocaleString()}</div>
                                <button class="add-btn" onclick="addToCart(${m.id})">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;

            document.getElementById('view-restaurants').classList.remove('active');
            document.getElementById('view-cart').classList.remove('active');
            document.getElementById('view-menus').classList.add('active');
            document.getElementById('header-title').innerText = name;
            document.getElementById('back-btn').style.display = 'flex';
            updateCartBar();
            window.scrollTo(0, 0);
        }

        function findMenu(id) {
            for (const k in dbMenus) {
                const m = dbMenus[k].find(x => x.id === id);
                if (m) return m;
            }
            return null;
        }

        function addToCart(id) {
            const m = findMenu(id);
            if (!m) return;
            const existing = cart.find(c => c.id === id);
            if (existing) existing.qty++;
            else cart.push({ id: m.id, name: m.name, price: m.price, img: m.img, qty: 1 });
            updateCartBar();
            // 살짝 피드백
            const btn = event.currentTarget;
            if (btn) {
                btn.style.background = 'var(--primary)';
                setTimeout(() => { btn.style.background = ''; }, 200);
            }
        }

        function changeQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            renderCart();
            updateCartBar();
        }

        function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
        function cartCount() { return cart.reduce((s, i) => s + i.qty, 0); }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            const count = cartCount();
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = 'Rp ' + cartTotal().toLocaleString();
            const onHome = document.getElementById('view-restaurants').classList.contains('active');
            const onCart = document.getElementById('view-cart').classList.contains('active');
            if (count > 0 && !onCart && !onHome) bar.classList.add('show');
            else bar.classList.remove('show');
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            if (cart.length === 0) {
                list.innerHTML = `<div class="empty"><div class="emoji">🛒</div><div class="msg">장바구니가 비어있어요</div></div>`;
            } else {
                list.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <div class="cthumb"><img src="${i.img}" alt=""></div>
                        <div class="cinfo">
                            <div class="cname">${i.name}</div>
                            <div class="cprice">Rp ${(i.price * i.qty).toLocaleString()}</div>
                        </div>
                        <div class="qty">
                            <button onclick="changeQty(${i.id}, -1)">−</button>
                            <span>${i.qty}</span>
                            <button onclick="changeQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');
            }
            const total = cartTotal();
            document.getElementById('sum-items').innerText = 'Rp ' + total.toLocaleString();
            document.getElementById('sum-total').innerText = 'Rp ' + total.toLocaleString();
        }

        function goToCart() {
            if (cart.length === 0) return;
            renderCart();
            document.getElementById('view-menus').classList.remove('active');
            document.getElementById('view-restaurants').classList.remove('active');
            document.getElementById('view-cart').classList.add('active');
            document.getElementById('header-title').innerText = '장바구니';
            document.getElementById('back-btn').style.display = 'flex';
            // 최근 주소 불러오기
            const saved = localStorage.getItem('lastAddr');
            if (saved && !document.getElementById('delivery-address').value) {
                document.getElementById('delivery-address').value = saved;
            }
            updateCartBar();
            window.scrollTo(0, 0);
        }

        function backToMenus() {
            if (currentResId) showMenus(currentResId, currentResName);
            else goHome();
        }

        function goHome() {
            // 메뉴 화면 → 홈으로 갈 때 장바구니는 유지하지 않음 (다른 식당 선택 가능)
            const onCart = document.getElementById('view-cart').classList.contains('active');
            if (onCart) {
                // 장바구니에서 뒤로 → 메뉴로
                backToMenus();
                return;
            }
            cart = [];
            currentResId = ''; currentResName = '';
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-restaurants').classList.add('active');
            document.getElementById('header-title').innerText = 'K-Food Jakarta';
            document.getElementById('back-btn').style.display = 'none';
            updateCartBar();
            window.scrollTo(0, 0);
        }

        function toggleReservation() {
            const isReserve = document.querySelector('input[name="sendType"]:checked').value === 'reserve';
            document.getElementById('reservation-field').style.display = isReserve ? 'block' : 'none';
        }

        function submitOrder() {
            const isReserve = document.querySelector('input[name="sendType"]:checked').value === 'reserve';
            const reserveTime = document.getElementById('reservation-time').value;
            const addr = document.getElementById('delivery-address').value.trim();

            if (isReserve && !reserveTime) return alert('예약 시간을 선택해주세요.');
            if (!addr) return alert('배달 주소를 입력해주세요.');

            localStorage.setItem('lastAddr', addr);

            const timeLabel = isReserve ? `예약 ${reserveTime.replace('T', ' ')}` : '즉시발송';
            const timeLabelEn = isReserve ? `Reservasi ${reserveTime.replace('T', ' ')}` : 'Kirim Sekarang';

            const total = cartTotal();
            let msg = `*[자카르타 K-Food 배달 주문]*\n\n`;
            msg += `🏪 *식당:* ${currentResName}\n`;
            msg += `⏰ *발송:* ${timeLabel}\n`;
            msg += `📍 *주소:* ${addr}\n\n`;
            msg += `📋 *주문 내역:*\n`;
            cart.forEach(i => msg += `• ${i.name} × ${i.qty} = Rp ${(i.price * i.qty).toLocaleString()}\n`);
            msg += `\n💰 *총 합계: Rp ${total.toLocaleString()}*\n`;
            msg += `\n---\n`;
            msg += `*[Pesanan Pengiriman Jakarta]*\n`;
            msg += `🏪 *Restoran:* ${currentResName}\n`;
            msg += `⏰ *Pengiriman:* ${timeLabelEn}\n`;
            msg += `📍 *Alamat:* ${addr}\n\n`;
            msg += `📋 *Pesanan:*\n`;
            cart.forEach(i => msg += `• ${i.name} × ${i.qty} = Rp ${(i.price * i.qty).toLocaleString()}\n`);
            msg += `\n💰 *Total: Rp ${total.toLocaleString()}*`;

            const phone = contacts[currentResId];
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

            window.open(url, '_blank');
            alert('WhatsApp으로 연결됩니다. 메시지를 전송해 주세요!');
            goHome();
        }

        // 초기 렌더
        renderRestaurants();
    </script>
</body>
